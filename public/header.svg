<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;display=swap');
      
      .bg { fill: #0a0a0a; }
      .grid-line { stroke: #1a1a1a; stroke-width: 1; }
      
      .title {
        font-family: 'Space Mono', monospace;
        font-size: 72px;
        font-weight: 700;
        fill: #ffffff;
        letter-spacing: -2px;
      }
      
      .subtitle {
        font-family: 'Space Mono', monospace;
        font-size: 13px;
        fill: #666;
        letter-spacing: 4px;
        text-transform: uppercase;
      }

      .tag {
        font-family: 'Space Mono', monospace;
        font-size: 11px;
        fill: #0a0a0a;
        font-weight: 700;
        letter-spacing: 1px;
      }

      .cursor {
        fill: #fff;
        animation: blink 1s step-end infinite;
      }

      .tag-bg-1 { fill: #ffffff; }
      .tag-bg-2 { fill: #ffffff; }
      .tag-bg-3 { fill: #ffffff; }
      .tag-bg-4 { fill: #ffffff; }

      .line-accent {
        stroke: #ffffff;
        stroke-width: 1;
        opacity: 0.15;
      }

      .dot {
        fill: #ffffff;
        animation: pulse 2s ease-in-out infinite;
      }
      
      .dot-2 { animation-delay: 0.4s; }
      .dot-3 { animation-delay: 0.8s; }

      .glitch-1 {
        fill: #ffffff;
        opacity: 0;
        animation: glitch1 4s infinite;
      }
      .glitch-2 {
        fill: #ff0040;
        opacity: 0;
        animation: glitch2 4s infinite;
      }

      .scanline {
        fill: none;
        stroke: #ffffff;
        stroke-width: 0.3;
        opacity: 0.03;
      }

      .reveal-line {
        stroke: #ffffff;
        stroke-width: 2;
        stroke-dasharray: 900;
        stroke-dashoffset: 900;
        animation: draw 1.5s ease forwards;
      }

      .fade-in { animation: fadeIn 1s ease forwards; opacity: 0; }
      .fade-in-2 { animation: fadeIn 1s ease 0.3s forwards; opacity: 0; }
      .fade-in-3 { animation: fadeIn 1s ease 0.6s forwards; opacity: 0; }
      .fade-in-4 { animation: fadeIn 1s ease 0.9s forwards; opacity: 0; }
      .fade-in-5 { animation: fadeIn 1s ease 1.2s forwards; opacity: 0; }

      .status-dot {
        fill: #00ff88;
        animation: statusPulse 2s ease-in-out infinite;
      }

      @keyframes blink {
        50% { opacity: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.5); }
      }
      @keyframes glitch1 {
        0%, 90%, 100% { opacity: 0; transform: translate(0,0); }
        92% { opacity: 0.08; transform: translate(-3px, 0); clip-path: inset(20% 0 60% 0); }
        94% { opacity: 0; }
        96% { opacity: 0.06; transform: translate(3px, 0); clip-path: inset(60% 0 10% 0); }
        98% { opacity: 0; }
      }
      @keyframes glitch2 {
        0%, 88%, 100% { opacity: 0; }
        90% { opacity: 0.1; transform: translate(2px, 0); clip-path: inset(40% 0 40% 0); }
        93% { opacity: 0; }
      }
      @keyframes draw {
        to { stroke-dashoffset: 0; }
      }
      @keyframes fadeIn {
        to { opacity: 1; }
      }
      @keyframes statusPulse {
        0%, 100% { opacity: 1; r: 4; }
        50% { opacity: 0.5; r: 6; }
      }
    </style>

    <!-- Noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" class="bg"/>

  <!-- Grid -->
  <g opacity="0.4">
    <line x1="0" y1="40" x2="900" y2="40" class="grid-line"/>
    <line x1="0" y1="80" x2="900" y2="80" class="grid-line"/>
    <line x1="0" y1="120" x2="900" y2="120" class="grid-line"/>
    <line x1="0" y1="160" x2="900" y2="160" class="grid-line"/>
    <line x1="0" y1="200" x2="900" y2="200" class="grid-line"/>
    <line x1="0" y1="240" x2="900" y2="240" class="grid-line"/>
    <line x1="100" y1="0" x2="100" y2="280" class="grid-line"/>
    <line x1="200" y1="0" x2="200" y2="280" class="grid-line"/>
    <line x1="300" y1="0" x2="300" y2="280" class="grid-line"/>
    <line x1="400" y1="0" x2="400" y2="280" class="grid-line"/>
    <line x1="500" y1="0" x2="500" y2="280" class="grid-line"/>
    <line x1="600" y1="0" x2="600" y2="280" class="grid-line"/>
    <line x1="700" y1="0" x2="700" y2="280" class="grid-line"/>
    <line x1="800" y1="0" x2="800" y2="280" class="grid-line"/>
  </g>

  <!-- Scanlines -->
  <g>
    <line x1="0" y1="10" x2="900" y2="10" class="scanline"/>
    <line x1="0" y1="20" x2="900" y2="20" class="scanline"/>
    <line x1="0" y1="30" x2="900" y2="30" class="scanline"/>
  </g>

  <!-- Corner accents -->
  <g class="fade-in">
    <line x1="30" y1="20" x2="30" y2="50" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <line x1="20" y1="30" x2="50" y2="30" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <line x1="870" y1="20" x2="870" y2="50" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <line x1="850" y1="30" x2="880" y2="30" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <line x1="30" y1="250" x2="30" y2="260" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <line x1="20" y1="250" x2="50" y2="250" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <line x1="870" y1="250" x2="870" y2="260" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <line x1="850" y1="250" x2="880" y2="250" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Top bar -->
  <g class="fade-in">
    <circle cx="26" cy="30" r="4" class="status-dot"/>
    <text x="38" y="35" font-family="Space Mono, monospace" font-size="10" fill="#444" letter-spacing="2">ASHMIT.DEV // PORTFOLIO_v2.0</text>
    <text x="820" y="35" font-family="Space Mono, monospace" font-size="10" fill="#444">2026</text>
  </g>

  <!-- Main title -->
  <g class="fade-in-2">
    <text x="60" y="155" class="title">ASHMIT.</text>
    <!-- Glitch layers -->
    <text x="60" y="155" class="title glitch-1">ASHMIT.</text>
    <text x="60" y="155" class="title glitch-2">ASHMIT.</text>
    <!-- Cursor -->
    <rect x="520" y="110" width="8" height="55" class="cursor" rx="1"/>
  </g>

  <!-- Subtitle -->
  <g class="fade-in-3">
    <text x="62" y="185" class="subtitle">Creative Frontend Engineer · 16y/o Indie Dev</text>
  </g>

  <!-- Tags -->
  <g class="fade-in-4">
    <rect x="62" y="205" width="52" height="20" rx="2" class="tag-bg-1"/>
    <text x="70" y="219" class="tag">GSAP</text>

    <rect x="122" y="205" width="105" height="20" rx="2" class="tag-bg-2"/>
    <text x="130" y="219" class="tag">FRAMER MOTION</text>

    <rect x="235" y="205" width="62" height="20" rx="2" class="tag-bg-3"/>
    <text x="243" y="219" class="tag">NEXT.JS</text>

    <rect x="305" y="205" width="62" height="20" rx="2" class="tag-bg-4"/>
    <text x="313" y="219" class="tag">WEBRTC</text>

    <rect x="375" y="205" width="72" height="20" rx="2" style="fill:#ffffff"/>
    <text x="383" y="219" class="tag">THREE.JS</text>
  </g>

  <!-- Right side stats -->
  <g class="fade-in-5">
    <text x="700" y="120" font-family="Space Mono, monospace" font-size="11" fill="#333" letter-spacing="1">PROJECTS</text>
    <text x="700" y="145" font-family="Space Mono, monospace" font-size="36" fill="#fff" font-weight="700">04</text>

    <line x1="700" y1="160" x2="860" y2="160" stroke="#222" stroke-width="1"/>

    <text x="700" y="185" font-family="Space Mono, monospace" font-size="11" fill="#333" letter-spacing="1">GOOGLE RANK</text>
    <text x="700" y="210" font-family="Space Mono, monospace" font-size="36" fill="#fff" font-weight="700">#1</text>

    <!-- Decorative dots -->
    <circle cx="840" cy="100" r="4" class="dot"/>
    <circle cx="856" cy="100" r="4" class="dot dot-2"/>
    <circle cx="872" cy="100" r="4" class="dot dot-3"/>
  </g>

  <!-- Bottom reveal line -->
  <line x1="0" y1="277" x2="900" y2="277" class="reveal-line"/>
</svg>
