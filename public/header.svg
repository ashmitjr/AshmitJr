<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .bg { fill: #000000; }

    /* Particles */
    .p { fill: #ffffff; }
    .p1 { animation: float1 6s ease-in-out infinite; }
    .p2 { animation: float2 8s ease-in-out infinite 1s; }
    .p3 { animation: float3 7s ease-in-out infinite 2s; }
    .p4 { animation: float1 9s ease-in-out infinite 0.5s; }
    .p5 { animation: float2 5s ease-in-out infinite 3s; }
    .p6 { animation: float3 10s ease-in-out infinite 1.5s; }
    .p7 { animation: float1 7s ease-in-out infinite 4s; }
    .p8 { animation: float2 6s ease-in-out infinite 2.5s; }
    .p9 { animation: float3 8s ease-in-out infinite 0.2s; }
    .p10{ animation: float1 5s ease-in-out infinite 3.5s; }

    /* Horizontal scan line that sweeps */
    .scan {
      fill: none;
      stroke: url(#scanGrad);
      stroke-width: 1.5;
      animation: sweep 4s linear infinite;
      opacity: 0.6;
    }

    /* Main title */
    .name {
      font-family: 'Courier New', Courier, monospace;
      font-size: 96px;
      font-weight: 900;
      letter-spacing: -4px;
      fill: #ffffff;
    }
    .name-stroke {
      font-family: 'Courier New', Courier, monospace;
      font-size: 96px;
      font-weight: 900;
      letter-spacing: -4px;
      fill: none;
      stroke: #333;
      stroke-width: 1;
    }

    /* Glitch */
    .glitch-r {
      fill: #ff2255;
      opacity: 0;
      animation: glitchR 5s infinite 1s;
    }
    .glitch-b {
      fill: #00eeff;
      opacity: 0;
      animation: glitchB 5s infinite 1s;
    }

    .role {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      fill: #555;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    .tag-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .stat-num {
      font-family: 'Courier New', Courier, monospace;
      font-size: 28px;
      font-weight: 900;
      fill: #ffffff;
    }
    .stat-label {
      font-family: 'Courier New', Courier, monospace;
      font-size: 9px;
      fill: #444;
      letter-spacing: 3px;
    }

    .corner { stroke: #ffffff; stroke-width: 1.5; fill: none; opacity: 0.5; }
    .divider { stroke: #1a1a1a; stroke-width: 1; }

    /* Film grain overlay */
    .grain-dot { fill: #ffffff; opacity: 0.015; }

    /* Blinking cursor */
    .cursor {
      fill: #fff;
      animation: blink 1.1s step-end infinite;
    }

    /* Status indicator */
    .status-ring {
      fill: none;
      stroke: #00ff88;
      stroke-width: 1;
      animation: statusPing 2s ease-out infinite;
    }
    .status-core { fill: #00ff88; }

    /* Fade ins */
    .fi0 { opacity: 0; animation: fi 0.8s ease 0.1s forwards; }
    .fi1 { opacity: 0; animation: fi 0.8s ease 0.4s forwards; }
    .fi2 { opacity: 0; animation: fi 0.8s ease 0.7s forwards; }
    .fi3 { opacity: 0; animation: fi 0.8s ease 1.0s forwards; }
    .fi4 { opacity: 0; animation: fi 0.8s ease 1.3s forwards; }
    .fi5 { opacity: 0; animation: fi 0.8s ease 1.6s forwards; }

    /* Bottom line draw */
    .line-draw {
      stroke: #ffffff;
      stroke-width: 1;
      stroke-dasharray: 900;
      stroke-dashoffset: 900;
      animation: draw 2s ease 0.5s forwards;
      fill: none;
      opacity: 0.2;
    }
    .line-draw-accent {
      stroke: #fff;
      stroke-width: 2;
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: draw 1s ease 1.5s forwards;
      fill: none;
    }

    @keyframes float1 {
      0%,100% { transform: translateY(0px); opacity: 0.15; }
      50% { transform: translateY(-12px); opacity: 0.5; }
    }
    @keyframes float2 {
      0%,100% { transform: translateY(0px) translateX(0px); opacity: 0.1; }
      33% { transform: translateY(-8px) translateX(4px); opacity: 0.4; }
      66% { transform: translateY(4px) translateX(-4px); opacity: 0.2; }
    }
    @keyframes float3 {
      0%,100% { transform: translateY(0px); opacity: 0.08; }
      50% { transform: translateY(10px); opacity: 0.35; }
    }
    @keyframes sweep {
      0% { transform: translateY(-50px); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(370px); opacity: 0; }
    }
    @keyframes glitchR {
      0%,88%,100% { opacity: 0; transform: translate(0,0); }
      90% { opacity: 0.7; transform: translate(-4px, 0); clip-path: inset(15% 0 55% 0); }
      92% { opacity: 0; }
      94% { opacity: 0.5; transform: translate(4px, 2px); clip-path: inset(65% 0 5% 0); }
      96% { opacity: 0; }
    }
    @keyframes glitchB {
      0%,88%,100% { opacity: 0; transform: translate(0,0); }
      91% { opacity: 0.6; transform: translate(4px, 0); clip-path: inset(40% 0 30% 0); }
      93% { opacity: 0; }
      95% { opacity: 0.4; transform: translate(-3px, -1px); clip-path: inset(10% 0 70% 0); }
      97% { opacity: 0; }
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    @keyframes statusPing {
      0% { r: 5; opacity: 1; }
      100% { r: 14; opacity: 0; }
    }
    @keyframes fi {
      to { opacity: 1; }
    }
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
  </style>

  <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#000" stop-opacity="0"/>
    <stop offset="30%" stop-color="#fff" stop-opacity="0.8"/>
    <stop offset="70%" stop-color="#fff" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </linearGradient>

  <linearGradient id="fadeLeft" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#000" stop-opacity="1"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="fadeRight" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="1"/>
  </linearGradient>
</defs>

<!-- BG -->
<rect width="900" height="320" class="bg"/>

<!-- Subtle vertical lines -->
<g opacity="0.04">
  <line x1="150" y1="0" x2="150" y2="320" stroke="#fff" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="320" stroke="#fff" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="320" stroke="#fff" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="320" stroke="#fff" stroke-width="1"/>
  <line x1="750" y1="0" x2="750" y2="320" stroke="#fff" stroke-width="1"/>
</g>

<!-- Floating particles -->
<g class="fi0">
  <circle cx="80" cy="60" r="1.5" class="p p1"/>
  <circle cx="140" cy="200" r="1" class="p p2"/>
  <circle cx="820" cy="80" r="1.5" class="p p3"/>
  <circle cx="760" cy="240" r="1" class="p p4"/>
  <circle cx="50" cy="150" r="2" class="p p5"/>
  <circle cx="860" cy="160" r="1.5" class="p p6"/>
  <circle cx="180" cy="290" r="1" class="p p7"/>
  <circle cx="730" cy="290" r="1.5" class="p p8"/>
  <circle cx="420" cy="30" r="1" class="p p9"/>
  <circle cx="480" cy="295" r="1" class="p p10"/>
  <circle cx="220" cy="50" r="1" class="p p2"/>
  <circle cx="670" cy="50" r="1.5" class="p p1"/>
  <circle cx="350" cy="300" r="1" class="p p3"/>
  <circle cx="550" cy="15" r="1.5" class="p p5"/>
</g>

<!-- Scan line sweep -->
<line x1="0" y1="0" x2="900" y2="0" class="scan"/>

<!-- Corner brackets -->
<g class="fi0">
  <!-- TL -->
  <line x1="24" y1="24" x2="24" y2="56" class="corner"/>
  <line x1="24" y1="24" x2="56" y2="24" class="corner"/>
  <!-- TR -->
  <line x1="876" y1="24" x2="876" y2="56" class="corner"/>
  <line x1="844" y1="24" x2="876" y2="24" class="corner"/>
  <!-- BL -->
  <line x1="24" y1="296" x2="24" y2="264" class="corner"/>
  <line x1="24" y1="296" x2="56" y2="296" class="corner"/>
  <!-- BR -->
  <line x1="876" y1="296" x2="876" y2="264" class="corner"/>
  <line x1="844" y1="296" x2="876" y2="296" class="corner"/>
</g>

<!-- Top bar -->
<g class="fi1">
  <!-- Status -->
  <circle cx="44" cy="44" r="14" class="status-ring"/>
  <circle cx="44" cy="44" r="4" class="status-core"/>
  <text x="62" y="48" class="stat-label">ONLINE · OPEN FOR WORK</text>
  <text x="800" y="48" class="stat-label">v2.0.26</text>
</g>

<!-- Big name — shadow/ghost layer -->
<g class="fi2">
  <text x="58" y="188" class="name-stroke">ASHMIT.</text>
</g>

<!-- Glitch layers -->
<g class="fi2">
  <text x="58" y="188" class="name glitch-r">ASHMIT.</text>
  <text x="58" y="188" class="name glitch-b">ASHMIT.</text>
</g>

<!-- Main name -->
<g class="fi2">
  <text x="58" y="188" class="name">ASHMIT.</text>
  <!-- Cursor after name -->
  <rect x="564" y="130" width="7" height="64" rx="1" class="cursor"/>
</g>

<!-- Role -->
<g class="fi3">
  <text x="62" y="218" class="role">Creative Frontend Engineer  ·  16y/o Indie Dev</text>
</g>

<!-- Tags row -->
<g class="fi4">
  <!-- GSAP -->
  <rect x="62" y="235" width="48" height="18" rx="0" fill="#ffffff"/>
  <text x="68" y="248" class="tag-text" fill="#000">GSAP</text>
  <!-- FRAMER -->
  <rect x="116" y="235" width="70" height="18" rx="0" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="122" y="248" class="tag-text" fill="#888">FRAMER</text>
  <!-- NEXT.JS -->
  <rect x="192" y="235" width="58" height="18" rx="0" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="198" y="248" class="tag-text" fill="#888">NEXT.JS</text>
  <!-- WEBRTC -->
  <rect x="256" y="235" width="62" height="18" rx="0" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="262" y="248" class="tag-text" fill="#888">WEBRTC</text>
  <!-- THREE.JS -->
  <rect x="324" y="235" width="62" height="18" rx="0" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="330" y="248" class="tag-text" fill="#888">THREE.JS</text>
</g>

<!-- Right side stats panel -->
<g class="fi5">
  <!-- Vertical divider -->
  <line x1="720" y1="80" x2="720" y2="270" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Stat 1 -->
  <text x="740" y="118" class="stat-label">PROJECTS SHIPPED</text>
  <text x="740" y="150" class="stat-num">04</text>
  <line x1="740" y1="162" x2="870" y2="162" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Stat 2 -->
  <text x="740" y="185" class="stat-label">GOOGLE RANK</text>
  <text x="740" y="217" class="stat-num">#1</text>
  <line x1="740" y1="229" x2="870" y2="229" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Stat 3 -->
  <text x="740" y="252" class="stat-label">BUILDING</text>
  <text x="740" y="268" font-family="Courier New, monospace" font-size="13" font-weight="700" fill="#fff" letter-spacing="1">MITSU MOTION</text>
</g>

<!-- Bottom draw line -->
<line x1="0" y1="310" x2="900" y2="310" class="line-draw"/>
<line x1="58" y1="310" x2="258" y2="310" class="line-draw-accent"/>

<!-- Film effect overlays -->
<rect x="0" y="0" width="60" height="320" fill="url(#fadeLeft)" opacity="0.4"/>
<rect x="840" y="0" width="60" height="320" fill="url(#fadeRight)" opacity="0.4"/>

</svg>
